<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор загрузки — ТРУБЫ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#1a1a1a;font-family:'JetBrains Mono',monospace;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f0f0f0}::-webkit-scrollbar-thumb{background:#cc2222;border-radius:3px}
.app{max-width:1400px;margin:0 auto;padding:16px}
h1{color:#cc2222;font-size:20px;font-weight:700;margin-bottom:4px}
.card{background:#f7f7f7;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px}
.card-title{color:#cc2222;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.vtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff;color:#555;font-family:inherit;font-size:11px;transition:all .2s;white-space:nowrap}
.tab.active{background:#cc2222;color:#fff;border-color:#cc2222;font-weight:600}
table{width:100%;border-collapse:collapse}
th{color:#888;font-size:11px;font-weight:500;text-align:left;padding:6px 8px;border-bottom:1px solid #ddd;white-space:nowrap}
td{padding:4px;border-bottom:1px solid #eee;vertical-align:middle}
input[type=number],input[type=text],select{background:#fff;border:1px solid #ccc;color:#1a1a1a;padding:5px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:100%;outline:none}
input:focus,select:focus{border-color:#cc2222}
select option{background:#fff}
.btn{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .2s}
.btn-primary{background:#cc2222;color:#fff}.btn-primary:hover{background:#aa1111}
.btn-secondary{background:#eee;color:#333;border:1px solid #ccc}.btn-secondary:hover{background:#ddd}
.btn-danger{background:transparent;color:#ef4444;border:1px solid #ef444455;padding:4px 10px;font-size:11px}.btn-danger:hover{background:#ef444411}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #ddd;border-radius:6px;padding:12px}
.stat-val{font-size:24px;font-weight:700;color:#cc2222}
.stat-label{color:#888;font-size:10px;margin-top:2px}
.nbadge{display:inline-block;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;padding:2px 8px;border-radius:10px;font-size:10px}
.err{background:#fff0f0;border:1px solid #ef4444;border-radius:6px;padding:10px 14px;color:#cc2222;font-size:11px;margin-bottom:12px}
.pbar-wrap{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:12px}
.pbar{height:100%;border-radius:3px;transition:width .5s}
.footer{color:#aaa;font-size:11px;text-align:center;margin-top:16px;padding:10px 0 12px;border-top:1px solid #ddd;letter-spacing:1px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState, useRef=React.useRef;

var VEHICLES={
  truck:{name:'Фура',          icon:'🚛',l:13600,w:2440,h:2580,maxW:22000},
  wagon:{name:'Полувагон',     icon:'🚃',l:12680,w:2830,h:2170,maxW:63000},
  c20:  {name:'20-фут. контейнер',icon:'📦',l:5867, w:2352,h:2393,maxW:21700},
  c40:  {name:'40-фут. контейнер',icon:'📦',l:12032,w:2350,h:2390,maxW:26680},
  c45:  {name:'45-фут. контейнер',icon:'📦',l:13513,w:2444,h:2549,maxW:27600}
};
var MATERIALS=[
  {id:'steel',rho:7850,name:'Сталь'},{id:'stainless',rho:7900,name:'Нержавейка'},
  {id:'copper',rho:8900,name:'Медь'},{id:'aluminum',rho:2700,name:'Алюминий'},
  {id:'brass',rho:8500,name:'Латунь'},{id:'titanium',rho:4500,name:'Титан'},
  {id:'cast_iron',rho:7200,name:'Чугун'},{id:'nickel',rho:8900,name:'Никель'},
  {id:'zinc',rho:7130,name:'Цинк'},{id:'lead',rho:11340,name:'Свинец'}
];
var COLORS=['#60a5fa','#fbbf24','#4ade80','#fb923c','#a78bfa','#34d399','#f472b6','#f87171','#38bdf8','#e879f9'];
function getMat(id){return MATERIALS.find(function(m){return m.id===id;})||MATERIALS[0];}
function calcWpm(D,t,rho){return Math.PI*t*(D-t)/1e6*rho;}
function calcW(D,t,L,n,rho){return calcWpm(D,t,rho)*(L/1000)*n;}

// ─── Gravity Simulator ───────────────────────────────────────────────────────
function gravSim(W,H,initPipes){
  var pipes=initPipes?initPipes.map(function(p){return {cx:p.cx,cy:p.cy,r:p.r,diameter:p.diameter,posId:p.posId};}):[];
  function findY(cx,r){
    var best=r;
    for(var i=0;i<pipes.length;i++){var p=pipes[i],dx=Math.abs(cx-p.cx),md=r+p.r;if(dx<md){var c=p.cy+Math.sqrt(md*md-dx*dx);if(c>best)best=c;}}
    return best;
  }
  function bestPos(r){
    var cands=[r,W-r];
    for(var i=0;i<pipes.length;i++){
      var p=pipes[i];
      cands.push(p.cx-p.r-r,p.cx+p.r+r);
      for(var j=i+1;j<pipes.length;j++){
        var q=pipes[j],a=p.r+r,b=q.r+r,D=Math.abs(p.cx-q.cx);
        if(D<a+b&&D>Math.abs(a-b))cands.push(p.cx+(D*D+a*a-b*b)/(2*D)*(q.cx>p.cx?1:-1));
      }
    }
    var best=null;
    for(var k=0;k<cands.length;k++){
      var cx=cands[k];
      if(cx-r<-0.1||cx+r>W+0.1)continue;
      var cy=findY(cx,r);
      if(cy+r>H+0.1)continue;
      var ok=true;
      for(var m=0;m<pipes.length;m++){var pp=pipes[m],ddx=cx-pp.cx,ddy=cy-pp.cy;if(Math.sqrt(ddx*ddx+ddy*ddy)<r+pp.r-0.5){ok=false;break;}}
      if(!ok)continue;
      if(!best||cy<best.cy||(Math.abs(cy-best.cy)<0.5&&cx<best.cx))best={cx:cx,cy:cy};
    }
    return best;
  }
  return {
    getPipes:function(){return pipes;},
    calcFit:function(diameter,maxCount){
      var clone=gravSim(W,H,pipes),r=diameter/2,count=0;
      while(count<maxCount){var pos=clone.bestPos(r);if(!pos)break;clone.getPipes().push({cx:pos.cx,cy:pos.cy,r:r,diameter:diameter});count++;}
      return count;
    },
    bestPos:bestPos,
    commit:function(posId,diameter,maxCount){
      var r=diameter/2,placed=0;
      while(placed<maxCount){var pos=bestPos(r);if(!pos)break;pipes.push({cx:pos.cx,cy:pos.cy,r:r,diameter:diameter,posId:posId});placed++;}
      return placed;
    }
  };
}

// ─── Load / Optimize ─────────────────────────────────────────────────────────
function loadVehicle(positions,vKey){
  var v=VEHICLES[vKey],sim=gravSim(v.w,v.h,[]),totalWeight=0,loaded=[];
  var sorted=positions.slice().sort(function(a,b){return b.diameter-a.diameter;});
  var remaining=sorted.map(function(p){return {p:p,rem:p.count,rowsAlong:Math.max(1,Math.floor(v.l/p.length))};});
  var guard=0;
  while(guard++<200){
    var anyPlaced=false,stillLeft=[];
    for(var i=0;i<remaining.length;i++){
      var item=remaining[i],p=item.p,rowsAlong=item.rowsAlong;
      var wPer=calcWpm(p.diameter,p.thickness,p.rho)*(p.length/1000);
      var maxByW=wPer>0?Math.floor((v.maxW-totalWeight)/wPer):item.rem;
      var canTake=Math.min(item.rem,maxByW);
      if(canTake<1){stillLeft.push(item);continue;}
      var fitPerSection=sim.calcFit(p.diameter,Math.ceil(canTake/rowsAlong));
      var fit=Math.min(fitPerSection*rowsAlong,canTake);
      if(fit<1){stillLeft.push(item);continue;}
      var actualSection=sim.commit(p.id,p.diameter,Math.ceil(fit/rowsAlong));
      var actual=Math.min(actualSection*rowsAlong,canTake);
      if(actual<1){stillLeft.push(item);continue;}
      totalWeight+=actual*wPer;
      var ex=null;
      for(var j=0;j<loaded.length;j++){if(loaded[j].id===p.id){ex=loaded[j];break;}}
      if(ex){ex.loaded+=actual;ex.rowsAlong=rowsAlong;}
      else loaded.push({id:p.id,name:p.name,diameter:p.diameter,thickness:p.thickness,length:p.length,loaded:actual,wPerPipe:wPer,rho:p.rho,rowsAlong:rowsAlong});
      if(actual<item.rem)stillLeft.push({p:p,rem:item.rem-actual,rowsAlong:rowsAlong});
      anyPlaced=true;
    }
    remaining=stillLeft;
    if(!anyPlaced||remaining.length===0)break;
  }
  var pipes=sim.getPipes();
  var usedH=pipes.length?Math.max.apply(null,pipes.map(function(pp){return pp.cy+pp.r;})):0;
  return {loaded:loaded,totalWeight:totalWeight,pipes:pipes,usedH:usedH};
}

function optimizeLoading(positions,vKey){
  var vehicles=[],rem=positions.map(function(p){return {p:p,count:p.count};});
  var guard=0;
  while(guard++<500){
    var active=rem.filter(function(r){return r.count>0;}).map(function(r){
      return {id:r.p.id,name:r.p.name,diameter:r.p.diameter,thickness:r.p.thickness,length:r.p.length,rho:r.p.rho,count:r.count};
    });
    if(!active.length)break;
    var res=loadVehicle(active,vKey);
    if(!res.loaded.length)break;
    vehicles.push({number:vehicles.length+1,loaded:res.loaded,totalWeight:res.totalWeight,pipes:res.pipes,usedH:res.usedH});
    rem=rem.map(function(r){var l=res.loaded.find(function(x){return x.id===r.p.id;});return l?{p:r.p,count:r.count-l.loaded}:r;});
  }
  return vehicles;
}

// ─── Визуализация ─────────────────────────────────────────────────────────────
function VizFront(props){
  var pipes=props.pipes,vKey=props.vKey,colorMap=props.colorMap;
  var v=VEHICLES[vKey],sc=150/v.h,W=v.w*sc,H=v.h*sc,pad=28;
  return (
    <svg width={W+pad*2} height={H+pad*2} style={{display:'block'}}>
      <rect x={pad} y={pad} width={W} height={H} fill="#f0f0f0" stroke="#bbb" strokeWidth={1}/>
      {pipes.map(function(p,i){
        var cx=pad+p.cx*sc,cy=pad+H-p.cy*sc,r=Math.max(p.r*sc-0.5,0.5),color=colorMap[p.diameter]||'#888';
        return <g key={i}>
          <circle cx={cx} cy={cy} r={r} fill={color} fillOpacity={0.8} stroke={color} strokeWidth={0.5}/>
          {r>10&&<text x={cx} y={cy+3} textAnchor="middle" fontSize={Math.min(r*0.7,10)} fill="#fff" fontWeight="700" fontFamily="monospace">{p.diameter}</text>}
        </g>;
      })}
      <text x={pad+W/2} y={pad+H+17} textAnchor="middle" fontSize={9} fill="#888" fontFamily="monospace">{v.w} мм</text>
      <text x={pad-16} y={pad+H/2} textAnchor="middle" fontSize={9} fill="#888" fontFamily="monospace" transform={"rotate(-90,"+(pad-16)+","+(pad+H/2)+")"}>{v.h} мм</text>
    </svg>
  );
}

function VizSide(props){
  var vKey=props.vKey,colorMap=props.colorMap,loaded=props.loaded,pipes=props.pipes;
  var v=VEHICLES[vKey],scH=150/v.h,H=v.h*scH,W=v.l*scH,pad=28;
  var pipeRange={};
  for(var pi=0;pi<pipes.length;pi++){
    var pp=pipes[pi],d=pp.diameter;
    if(!pipeRange[d])pipeRange[d]={minY:Infinity,maxY:0};
    if(pp.cy-pp.r<pipeRange[d].minY)pipeRange[d].minY=pp.cy-pp.r;
    if(pp.cy+pp.r>pipeRange[d].maxY)pipeRange[d].maxY=pp.cy+pp.r;
  }
  var sortedL=loaded.slice().sort(function(a,b){
    var ra=pipeRange[a.diameter]||{minY:0},rb=pipeRange[b.diameter]||{minY:0};
    return ra.minY-rb.minY;
  });
  var strips=[];
  for(var i=0;i<sortedL.length;i++){
    var lp=sortedL[i],d2=lp.diameter,tubeLen=lp.length,rows=lp.rowsAlong||1;
    var color=colorMap[d2]||'#888',range=pipeRange[d2];
    if(!range)continue;
    var bW=(tubeLen/v.l)*W,yTop=pad+H-range.maxY*scH,h=Math.max((range.maxY-range.minY)*scH,2);
    var labelOffset=0;
    for(var j=0;j<i;j++){var other=sortedL[j],ro=pipeRange[other.diameter];if(ro&&ro.minY<range.maxY&&ro.maxY>range.minY)labelOffset+=80;}
    for(var ri=0;ri<rows;ri++){
      strips.push({x:pad+ri*bW,y:yTop,w:bW-1,h:h,color:color,opacity:ri%2===0?0.7:0.4,label:'Ø'+d2+' р.'+(ri+1)+' ('+tubeLen/1000+'м)',labelOffset:labelOffset});
    }
  }
  var maxUsedX=pad;
  for(var si=0;si<strips.length;si++){var ex2=strips[si].x+strips[si].w;if(ex2>maxUsedX)maxUsedX=ex2;}
  var freeLen=Math.round((pad+W-maxUsedX)/W*v.l);
  return (
    <svg width={W+pad*2} height={H+pad*2} style={{display:'block'}}>
      <rect x={pad} y={pad} width={W} height={H} fill="#f0f0f0" stroke="#bbb" strokeWidth={1}/>
      {strips.map(function(s,i){
        return <g key={i}>
          <rect x={s.x} y={s.y} width={s.w} height={s.h} fill={s.color} fillOpacity={s.opacity} stroke={s.color} strokeWidth={1}/>
          <text x={s.x+6+s.labelOffset} y={s.y+12} fontSize={9} fill="#fff" fontFamily="monospace">{s.label}</text>
        </g>;
      })}
      {freeLen>50&&<text x={maxUsedX+8} y={pad+H/2+4} fontSize={9} fill="#999" fontFamily="monospace">{freeLen} мм своб.</text>}
      <text x={pad+W/2} y={pad+H+17} textAnchor="middle" fontSize={9} fill="#888" fontFamily="monospace">{v.l} мм</text>
    </svg>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
var uid=1;
function newRow(){return {id:uid++,name:'',diameter:219,thickness:6,length:12000,count:1,material:'steel'};}

function App(){
  var s1=useState('truck');var vKey=s1[0],setVKey=s1[1];
  var s2=useState([newRow()]);var rows=s2[0],setRows=s2[1];
  var s3=useState(null);var res=s3[0],setRes=s3[1];
  var s4=useState('');var err=s4[0],setErr=s4[1];
  var s5=useState(false);var busy=s5[0],setBusy=s5[1];
  var fileRef=useRef();

  var diams=[];
  rows.forEach(function(r){if(diams.indexOf(r.diameter)<0)diams.push(r.diameter);});
  var colorMap={};
  diams.forEach(function(d,i){colorMap[d]=COLORS[i%COLORS.length];});

  function upd(id,f,v){setRows(function(rs){return rs.map(function(row){return row.id===id?Object.assign({},row,{[f]:v}):row;});});}

  function calculate(){
    setErr('');
    var valid=rows.filter(function(r){return r.diameter>0&&r.thickness>0&&r.count>0&&r.length>0;});
    if(!valid.length){setErr('Нет корректных позиций');return;}
    var v=VEHICLES[vKey];
    var tooLong=valid.filter(function(r){return r.length>v.l;});
    if(tooLong.length){setErr('Труба "'+tooLong[0].name+'" ('+tooLong[0].length+' мм) не влезает в грузовое пространство '+v.name+' ('+v.l+' мм). Выберите другой транспорт.');return;}
    var tooWide=valid.filter(function(r){return r.diameter>v.w;});
    if(tooWide.length){setErr('Диаметр '+tooWide[0].diameter+' мм превышает ширину '+v.name+' ('+v.w+' мм)');return;}
    setBusy(true);
    setTimeout(function(){
      try{
        var positions=valid.map(function(r){return {id:r.id,name:r.name,diameter:r.diameter,thickness:r.thickness,length:r.length,count:r.count,rho:getMat(r.material).rho};});
        setRes({vehicles:optimizeLoading(positions,vKey),positions:positions,vKey:vKey});
      }catch(e){setErr('Ошибка: '+e.message);}
      setBusy(false);
    },30);
  }

  function parseNameDT(name){
    var m=name.match(/(\d+[,.]?\d*)[хx×](\d+[,.]?\d*)/i);
    if(m)return {d:parseFloat(m[1].replace(',','.')),t:parseFloat(m[2].replace(',','.'))};
    return null;
  }

  function loadFile(file){
    if(!file)return;
    var name=file.name.toLowerCase();
    if(name.endsWith('.xlsx')||name.endsWith('.xls')){
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var wb=XLSX.read(e.target.result,{type:'binary'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var data=XLSX.utils.sheet_to_json(ws,{defval:''});
          var nr=data.map(function(row){
            var keys=Object.keys(row);
            function findKey(variants){
              for(var i=0;i<variants.length;i++)
                for(var j=0;j<keys.length;j++)
                  if(keys[j].toLowerCase().indexOf(variants[i])>=0) return keys[j];
              return null;
            }
            function findVal(variants){
              var k=findKey(variants);
              return k ? String(row[k]).replace(',','.') : '';
            }
            var nameVal=findVal(['наим','name','номенкл','описан']);
            var dVal=parseFloat(findVal(['диам','diameter','dn','∅'])||0);
            var tVal=parseFloat(findVal(['стенк','толщ','thickness','wall'])||0);
            var cVal=Math.ceil(parseFloat(findVal(['кол','qty','count','колич','шт'])||1));

            // Длина: ищем ключ и определяем единицу из заголовка
            var lenKey=findKey(['длина одной','длин','length','len']);
            var lVal=0;
            if(lenKey){
              lVal=parseFloat(String(row[lenKey]).replace(',','.'))||0;
              var lkl=lenKey.toLowerCase();
              if(lkl.indexOf('мм')>=0||lkl.indexOf('mm')>=0){
                // уже в мм — не трогаем
              } else if(lkl.indexOf('см')>=0||lkl.indexOf('cm')>=0){
                lVal=lVal*10;
              } else {
                // по умолчанию считаем метры → мм
                lVal=lVal*1000;
              }
            }
            if(!dVal&&nameVal){var dt=parseNameDT(nameVal);if(dt){dVal=dt.d;tVal=dt.t;}}
            if(!lVal)lVal=12000;
            if(lVal>0&&lVal<100)lVal=lVal*1000; // страховка: если забыли единицу и значение совсем маленькое
            return {id:uid++,name:nameVal,diameter:dVal,thickness:tVal,length:lVal,count:cVal||1,material:'steel'};
          }).filter(function(r){return r.diameter>0;});
          if(!nr.length)throw new Error('Строк с диаметром не найдено. Проверьте заголовки колонок.');
          setRows(nr);setErr('');
        }catch(ex){setErr('Ошибка Excel: '+ex.message);}
      };
      reader.readAsBinaryString(file);
    } else {
      var reader2=new FileReader();
      reader2.onload=function(e){
        try{
          var data=JSON.parse(e.target.result);
          if(!data.positions)throw new Error('Нет поля positions');
          var nr=data.positions.map(function(p){
            var d=p.diameter,t=p.thickness;
            if(!d&&p.name){var dt=parseNameDT(p.name);if(dt){d=dt.d;t=dt.t;}}
            var len=p.length||12000,cnt=p.count||0;
            if(!len&&p.totalMeters)len=p.totalMeters<6?p.totalMeters*1000:12000;
            if(!cnt&&p.totalMeters&&len)cnt=Math.ceil(p.totalMeters/(len/1000));
            return {id:uid++,name:p.name||'',diameter:d||0,thickness:t||0,length:len,count:cnt,material:'steel'};
          }).filter(function(r){return r.diameter>0;});
          setRows(nr);setErr('');
        }catch(ex){setErr('Ошибка JSON: '+ex.message);}
      };
      reader2.readAsText(file);
    }
  }

  var totalW=rows.reduce(function(s,r){return s+calcW(r.diameter,r.thickness,r.length,r.count,getMat(r.material).rho);},0);
  var v=VEHICLES[vKey];

  return (
    <div className="app">
      {/* Шапка */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:20}}>
        <svg width="400" height="72" viewBox="0 0 400 72" xmlns="http://www.w3.org/2000/svg">
          <text x="0"  y="62" fontFamily="Arial Narrow,Arial,sans-serif" fontSize="72" fontWeight="700" fill="#cc2222">Е</text>
          <text x="46" y="62" fontFamily="Arial Narrow,Arial,sans-serif" fontSize="72" fontWeight="700" fill="#1a1a1a">М</text>
          <text x="100" y="62" fontFamily="Arial Narrow,Arial,sans-serif" fontSize="72" fontWeight="700" fill="#cc2222">К</text>
          <text x="158" y="22" fontFamily="Arial,sans-serif" fontSize="16" fontWeight="700" fill="#1a1a1a" letterSpacing="1">ЕВРОПЕЙСКАЯ</text>
          <text x="158" y="46" fontFamily="Arial,sans-serif" fontSize="16" fontWeight="700" fill="#1a1a1a" letterSpacing="1">МЕТАЛЛУРГИЧЕСКАЯ</text>
          <text x="158" y="68" fontFamily="Arial,sans-serif" fontSize="16" fontWeight="700" fill="#1a1a1a" letterSpacing="1">КОМПАНИЯ</text>
        </svg>
        <h1>Калькулятор загрузки — ТРУБЫ</h1>
      </div>

      {/* Транспорт */}
      <div className="vtabs">
        {Object.keys(VEHICLES).map(function(k){
          var vv=VEHICLES[k];
          return <button key={k} className={"tab"+(vKey===k?' active':'')} onClick={function(){setVKey(k);setRes(null);setErr('');}}>
            {vv.icon} {vv.name}<br/>
            <span style={{opacity:.6,fontSize:9}}>{vv.w}×{vv.h}мм · {vv.maxW/1000}т</span>
          </button>;
        })}
      </div>

      {/* Позиции */}
      <div className="card">
        <div className="card-title">📋 Позиции</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          <button className="btn btn-primary" onClick={function(){setRows(function(r){return r.concat([newRow()]);});}}>+ Добавить строку</button>
          <button className="btn btn-secondary"
            title="Поддерживаемые форматы: JSON (1С), Excel (.xlsx, .xls)"
            onClick={function(){fileRef.current.click();}}>
            📁 Добавить файл
          </button>
          <input ref={fileRef} type="file" accept=".json,.txt,.xlsx,.xls" style={{display:'none'}} onChange={function(e){loadFile(e.target.files[0]);e.target.value='';}}/>
          {rows.length>1&&<button className="btn btn-secondary" style={{fontSize:11,padding:'4px 10px'}} onClick={function(){setRows([newRow()]);setRes(null);setErr('');}}>✕ Очистить</button>}
        </div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th style={{width:24}}>#</th><th>Наименование</th>
                <th style={{width:85}}>Ø, мм</th><th style={{width:80}}>Стенка, мм</th>
                <th style={{width:105}}>Длина</th><th style={{width:75}}>Кол-во</th>
                <th style={{width:115}}>Материал</th><th style={{width:75}}>кг/м</th>
                <th style={{width:80}}>Вес, т</th><th style={{width:32}}></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(function(row,i){
                var m=getMat(row.material);
                var wpm=calcWpm(row.diameter,row.thickness,m.rho);
                var wt=calcW(row.diameter,row.thickness,row.length,row.count,m.rho)/1000;
                var oversized=row.diameter>v.w, tooLong=row.length>v.l;
                return (
                  <tr key={row.id} style={(oversized||tooLong)?{background:'#fff0f0'}:{}}>
                    <td style={{color:'#aaa',textAlign:'center'}}>{i+1}</td>
                    <td><input type="text" value={row.name} onChange={function(e){upd(row.id,'name',e.target.value);}} placeholder="Труба 219×6..."/></td>
                    <td>
                      <input type="number" value={row.diameter} min={10} onChange={function(e){upd(row.id,'diameter',+e.target.value||0);}} onFocus={function(e){e.target.select();}} style={oversized?{borderColor:'#ef4444',color:'#ef4444'}:{}}/>
                      {oversized&&<div style={{color:'#ef4444',fontSize:9}}>⚠ Ø &gt; {v.w}мм</div>}
                    </td>
                    <td><input type="number" value={row.thickness} min={1} step={0.5} onChange={function(e){upd(row.id,'thickness',+e.target.value||0);}} onFocus={function(e){e.target.select();}}/></td>
                    <td>
                      <select value={row.length} onChange={function(e){upd(row.id,'length',+e.target.value);}} style={tooLong?{borderColor:'#ef4444',color:'#ef4444'}:{}}>
                        {(function(){
                          var opts=[6000,12000];
                          if(opts.indexOf(row.length)<0) opts=[row.length].concat(opts).sort(function(a,b){return a-b;});
                          return opts.map(function(o){return <option key={o} value={o}>{(o/1000).toLocaleString('ru')+' 000 мм'}</option>;});
                        })()}
                      </select>
                      {tooLong&&<div style={{color:'#ef4444',fontSize:9}}>⚠ &gt; {v.l}мм</div>}
                    </td>
                    <td><input type="number" value={row.count} min={1} onChange={function(e){upd(row.id,'count',Math.max(1,Math.ceil(+e.target.value||1)));}} onFocus={function(e){e.target.select();}}/></td>
                    <td>
                      <select value={row.material} onChange={function(e){upd(row.id,'material',e.target.value);}}>
                        {MATERIALS.map(function(m){return <option key={m.id} value={m.id}>{m.name}</option>;})}
                      </select>
                    </td>
                    <td style={{color:'#888',textAlign:'right'}}>{wpm.toFixed(2)}</td>
                    <td style={{color:colorMap[row.diameter]||'#cc2222',textAlign:'right',fontWeight:600}}>{wt.toFixed(3)}</td>
                    <td><button className="btn btn-danger" onClick={function(){setRows(function(rs){return rs.filter(function(x){return x.id!==row.id;});});}}>✕</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:12,display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={calculate} disabled={busy} style={{minWidth:160}}>
            {busy?'⏳ Расчёт...':'⚡ Рассчитать загрузку'}
          </button>
          <span style={{color:'#888',fontSize:11}}>Итого: {rows.reduce(function(s,r){return s+r.count;},0)} шт · {(totalW/1000).toFixed(3)} т</span>
        </div>
      </div>

      {err&&<div className="err">⚠ {err}</div>}

      {/* Результаты */}
      {res&&(function(){
        var allLoaded=res.vehicles.reduce(function(s,vr){return s+vr.loaded.reduce(function(ss,p){return ss+p.loaded;},0);},0);
        var allTotal=res.positions.reduce(function(s,p){return s+p.count;},0);
        var leftover=allTotal-allLoaded;
        var totalWL=res.vehicles.reduce(function(s,vr){return s+vr.totalWeight;},0);
        return (
          <div>
            <div className="card">
              <div className="card-title">📊 Итоги</div>
              <div className="stat-grid">
                <div className="stat"><div className="stat-val">{res.vehicles.length}</div><div className="stat-label">{VEHICLES[res.vKey].icon} {VEHICLES[res.vKey].name}</div></div>
                <div className="stat"><div className="stat-val">{(totalWL/1000).toFixed(2)}</div><div className="stat-label">Тонн загружено</div></div>
                <div className="stat"><div className="stat-val">{allLoaded}</div><div className="stat-label">Труб загружено</div></div>
                <div className="stat"><div className="stat-val">{res.positions.length}</div><div className="stat-label">Позиций</div></div>
                {leftover>0&&<div className="stat" style={{borderColor:'#ef444488'}}><div className="stat-val" style={{color:'#ef4444'}}>{leftover}</div><div className="stat-label">Не помещается</div></div>}
              </div>
            </div>
            {res.vehicles.map(function(vr,vi){
              var pct=Math.min(100,vr.totalWeight/VEHICLES[res.vKey].maxW*100);
              return (
                <div key={vi} className="card">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
                    <span style={{color:'#cc2222',fontWeight:700,fontSize:14}}>{VEHICLES[res.vKey].icon} {VEHICLES[res.vKey].name} №{vr.number}</span>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                      <span className="nbadge">⚖ {(vr.totalWeight/1000).toFixed(2)} т / {VEHICLES[res.vKey].maxW/1000} т</span>
                      <span style={{color:'#aaa',fontSize:10}}>{pct.toFixed(0)}% по весу</span>
                      <span style={{color:'#aaa',fontSize:10}}>↕ {Math.round(vr.usedH)} / {VEHICLES[res.vKey].h} мм</span>
                    </div>
                  </div>
                  <div className="pbar-wrap"><div className="pbar" style={{width:pct+'%',background:pct>95?'#ef4444':'#cc2222'}}/></div>
                  <div style={{overflowX:'auto',marginBottom:14}}>
                    <table>
                      <thead><tr><th>Позиция</th><th>Ø×стенка</th><th>Длина</th><th>Рядов по длине</th><th>Кол-во</th><th>Вес, т</th></tr></thead>
                      <tbody>
                        {vr.loaded.map(function(p,j){
                          return <tr key={j}>
                            <td style={{color:'#888'}}>{p.name||('Труба '+p.diameter+'×'+p.thickness)}</td>
                            <td><span style={{color:colorMap[p.diameter]||'#cc2222',fontWeight:600}}>Ø{p.diameter}×{p.thickness}</span></td>
                            <td>{p.length/1000} м</td>
                            <td style={{color:'#aaa',fontSize:11}}>{p.rowsAlong||1}</td>
                            <td style={{color:'#cc2222',fontWeight:600}}>{p.loaded} шт</td>
                            <td>{(p.wPerPipe*p.loaded/1000).toFixed(3)} т</td>
                          </tr>;
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                    <div>
                      <div style={{color:'#aaa',fontSize:10,marginBottom:4}}>ВИД СПЕРЕДИ (сечение)</div>
                      <VizFront pipes={vr.pipes} vKey={res.vKey} colorMap={colorMap}/>
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <div style={{color:'#aaa',fontSize:10,marginBottom:4}}>ВИД СБОКУ</div>
                      <VizSide loaded={vr.loaded} pipes={vr.pipes} vKey={res.vKey} colorMap={colorMap}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      <div className="footer">Developed and designed by EMC Logistics Department</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
